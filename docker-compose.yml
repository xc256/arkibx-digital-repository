services:
  postgres:
    image: postgres:15
    container_name: bioarchive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bioarchive

  backend:
    build: ./backend
    container_name: bioarchive_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - bioarchive

  frontend:
    build: ./frontend
    container_name: bioarchive_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - bioarchive

  nginx:
    image: nginx:1.25-alpine
    container_name: bioarchive_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bioarchive

volumes:
  postgres_data:

networks:
  bioarchive:
